spring.application.name=wxt-backend-java

spring.datasource.url=jdbc:postgresql://postgres:5432/wxt_db
spring.datasource.username=wxt_user
spring.datasource.password=wxt_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQL12Dialect
spring.jpa.properties.hibernate.format_sql=true

server.port=8080
server.servlet.context-path=/api

logging.level.root=INFO
logging.level.com.wxt=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n